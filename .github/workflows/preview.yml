name: Surge PR Preview

on:
  workflow_run:
    workflows: [ "CI" ]
    types:
      - completed
    branches-ignore:
      - 'main'

defaults:
  run:
    shell: bash

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      issues: write
      packages: read
      # this is unfortunately needed to be able to write comments on pull requests
      pull-requests: write
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Download PR Artifact
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ github.event.workflow_run.id }}
          name: site
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Store PR id as variable
        id: pr
        run: |
          pr=$(<pr-id.txt)
          if ! [[ $pr =~ ^[0-9]+$ ]] ; then
            echo "PR id extracted from pr-id.txt is not a number: $pr"
            exit 1
          fi
          echo "id=${pr}" >> $GITHUB_OUTPUT
          rm -f pr-id.txt
      - name: Publishing to surge for preview
        id: deploy
        run: npx surge@0.23.1 ./ --domain https://quarkiverse-antora-ui-quarkus-pr-${{ steps.pr.outputs.id }}-preview.surge.sh --token ${{ secrets.SURGE_TOKEN }}
      - name: Update PR status comment on success
        uses: quarkusio/action-helpers@main
        with:
          action: maintain-one-comment
          github-token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            🚀 PR Preview ${{ github.sha }} has been successfully built and deployed to https://quarkiverse-antora-ui-quarkus-pr-${{ steps.pr.outputs.id }}-preview.surge.sh
          body-marker: '<!-- Sticky Pull Request Comment -->'
          pr-number: ${{ steps.pr.outputs.id }}
      - name: Update PR status comment on failure
        uses: quarkusio/action-helpers@main
        if: ${{ failure() }}
        with:
          action: maintain-one-comment
          github-token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            😭 Deploy PR Preview failed.
          body-marker: '<!-- Sticky Pull Request Comment -->'
          pr-number: ${{ steps.pr.outputs.id }}
